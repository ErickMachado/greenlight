services:
  postgresql:
    container_name: "postgres"
    image: "postgres:15.17-alpine3.23"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "greenlight"
    volumes:
      - "../../scripts/dev_postgres_setup.sql:/docker-entrypoint-initdb.d/setup.sql"
